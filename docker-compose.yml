services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    depends_on:
      - api
    ports:
      - "5175:80"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/tracepilot
      PORT: 4040
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      BROWSERBASE_API_KEY: ${BROWSERBASE_API_KEY:-}
      AUDIT_HOST_GATEWAY: host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4041:4040"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tracepilot
    ports:
      - "55432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tracepilot"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
